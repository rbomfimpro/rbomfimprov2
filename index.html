<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rodrigo Bomfim — Site Reliability Engineer. 12+ anos em TI, especialista em cloud, Kubernetes, observabilidade e DevOps.">
  <meta property="og:title" content="Rodrigo Bomfim — SRE">
  <meta property="og:description" content="12+ anos em TI. Especialista em cloud, Kubernetes, observabilidade e DevOps.">
  <meta property="og:type" content="website">
  <title>Rodrigo Bomfim — SRE</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Ir para o conteúdo principal</a>

  <noscript>
    <div class="noscript-warning">JavaScript é necessário para exibir este site. Habilite o JavaScript no seu navegador.</div>
  </noscript>

  <div class="container">

    <header class="section" aria-label="Apresentação"></header>

    <main id="main-content">

      <section class="section" aria-label="Stack tecnológica">
        <h2 class="sr-only">Stack tecnológica</h2>
        <p class="cmd" aria-hidden="true">$ kubectl get stack -o wide</p>
        <div class="stack-grid" id="stack-grid"></div>
      </section>

      <section class="section" aria-label="Experiência profissional">
        <h2 class="sr-only">Experiência profissional</h2>
        <p class="cmd" aria-hidden="true">$ git log --oneline --career</p>
        <div class="timeline-card" id="timeline-container"></div>
      </section>

      <section class="section" aria-label="Certificações">
        <h2 class="sr-only">Certificações</h2>
        <p class="cmd" aria-hidden="true">$ cat /etc/credentials</p>
        <div class="certs-grid" id="certs-grid"></div>
      </section>

      <section class="section" aria-label="Contato">
        <h2 class="sr-only">Contato</h2>
        <p class="cmd" aria-hidden="true">$ echo $CONTACT</p>
        <div class="contact-row" id="contact-row"></div>
      </section>

    </main>

    <footer>
      <div class="cursor-line" aria-hidden="true">
        <span class="cursor-prompt">#</span>
        <span class="cursor-block"></span>
      </div>
    </footer>

  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
